id: V4.3.4
category:
  id: V4
  name: Release (CD*)
sub_category:
  id: V4.3
  name: Secure Deployment Practices
description: |-
  Verify that configuration information is secured in production using a
  secrets manager (e.g., Vault, AWS Secrets Manager). If encrypted config
  files are used instead, ensure encryption keys are stored separately in a
  secure service (e.g., KMS, HSM).
level: 2
mappings:
  nist_800_53:
    items:
      - SC-13
  owasp_cicd:
    items:
      - CICD-SEC-5
  cwe:
    items:
      - id: CWE-311
        description: Missing Encryption of Sensitive Data
      - id: CWE-312
        description: Cleartext Storage of Sensitive Information - Configuration protection
metadata:
  status: active
