repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  # ---------------------------------------------------------------------------
  # Ruff — lint then format (order matters)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^build/spvs_build/
      - id: ruff-format
        files: ^build/spvs_build/

  # ---------------------------------------------------------------------------
  # Mypy — strict static type checking
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - "click==8.1.7"
          - "ruamel.yaml==0.18.6"
          - "jsonschema==4.21.1"
          - "types-jsonschema>=1.0.0"
        args: ["--config-file", "build/pyproject.toml"]
        files: ^build/spvs_build/

  # ---------------------------------------------------------------------------
  # Secrets scanning
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # yamllint over controls/
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]
        files: ^controls/.*\.yaml$

  # ---------------------------------------------------------------------------
  # Conventional Commits (commit-msg stage)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, ci, build]

  # ---------------------------------------------------------------------------
  # SPVS-specific local hooks (validate + drift check)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: spvs-validate
        name: SPVS YAML validate
        entry: bash -c 'cd build && uv run python -m spvs_build validate --supplement ../controls/baseline --schema ../schema/control.schema.json'
        language: system
        files: ^(controls/baseline|schema)/
        pass_filenames: false

      - id: spvs-csv-drift
        name: SPVS regenerate baseline CSV
        entry: bash -c 'cd build && uv run python -m spvs_build build --supplement ../controls/baseline --schema ../schema/control.schema.json --renderer csv-baseline --out ../1.5/OWASP_SPVS_1.0_-en_Requirements.csv'
        language: system
        files: ^controls/baseline/
        pass_filenames: false
